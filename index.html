"},{"no":"232","subject":"國文","grade":"七年級","exam":"第三次段考","unit":"L7~10","source":"康軒B卷","question":"下列文句，何者有冗詞贅字？","option_a":"他自幼展現優異的繪畫天分，被譽為「小畢卡索」","option_b":"若是用錯誤的方法努力，到頭來也不過是白忙一場","option_c":"你也應該跟上時代，別再抱有這種過時落伍的想法","option_d":"在我看來，排不排隊，也沒有太大的關係","answer":"C","analysis":"","hint":""},{"no":"233","subject":"國文","grade":"七年級","exam":"第三次段考","unit":"L7~10","source":"康軒B卷","question":"下列文句，何者文意最為通暢？","option_a":"要是你太累，你就可輕鬆跟上我們的步伐","option_b":"由於颱風還未登陸，但已帶來大量的雨水","option_c":"這名歌手即使歌聲動人，還會作曲作詞","option_d":"窗外豔陽天，是他決定不帶傘就出門的","answer":"D","analysis":"","hint":""},{"no":"234","subject":"國文","grade":"七年級","exam":"第三次段考","unit":"L7~10","source":"康軒B卷","question":"「何夜無月？何處無竹柏？但少閑人如吾兩人耳！」根據這段，下列何者最適合說明作者被貶謫後此時賞月的心境？","option_a":"忘懷得失，隨遇而安","option_b":"胸中抑鬱，強顏歡笑","option_c":"國仇家恨，念茲在茲","option_d":"事不關己，己不勞心","answer":"A","analysis":"","hint":""},{"no":"235","subject":"國文","grade":"七年級","exam":"第三次段考","unit":"L7~10","source":"康軒B卷","question":"魯賓斯坦指出成功的途徑只有勤奮、苦練。下列敘述，何者表現同樣的成功特質？","option_a":"方仲永無師自通，四歲創作詩文，以寫詩取財富","option_b":"懷素立志練書法，寫破木板仍不輟，終於成名家","option_c":"莫札特六歲時就會作曲，被所有人稱為音樂神童","option_d":"牛頓表示他的成就來自「站在巨人的肩膀上」","answer":"B","analysis":"","hint":""},{"no":"236","subject":"國文","grade":"七年級","exam":"第三次段考","unit":"L7~10","source":"康軒B卷","question":"「即使你的資質再好，若沒有經過琢磨，也是一塊沒有什麼價值的璞玉。」這段文字的含義與下列何者最相近？","option_a":"金玉其外，敗絮其中","option_b":"被同一塊石頭絆倒兩次是一種恥辱","option_c":"書中自有千鍾粟，書中自有黃金屋","option_d":"金子，不經過烈火，又怎能純淨晶亮","answer":"D","analysis":"","hint":""},{"no":"237","subject":"國文","grade":"七年級","exam":"第三次段考","unit":"L7~10","source":"康軒B卷","question":"「像愛因斯坦之於相對論，像我祖母之於我家。」作者將兩者相提並論的主要原因為何？","option_a":"說明「小兵也可以立大功」","option_b":"兩者都具有功成不居的美德","option_c":"強調勤奮與樸實兩者的重要","option_d":"表現出平凡中見偉大的情操","answer":"B","analysis":"","hint":""},{"no":"238","subject":"國文","grade":"七年級","exam":"第三次段考","unit":"L7~10","source":"康軒B卷","question":"「無論什麼事，不是需要先人的遺愛與遺產，即是需要眾人的支持與合作。」這段文字的含義與下列何者最相近？","option_a":"一日之所需，百工斯為備","option_b":"但知行好事，莫要問前程","option_c":"天下無難事，只怕有心人","option_d":"寧可信其有，不可信其無","answer":"A","analysis":"","hint":""},{"no":"239","subject":"國文","grade":"七年級","exam":"第三次段考","unit":"L7~10","source":"康軒B卷","question":"「那說話的神情，像是包裹了一顆年輕旅行家的心，陶醉在長久的夢想裡，即使生活多麼艱苦，也要實現。」這段描述老太太的文字，旨在說明下列何事？","option_a":"老太太憑藉己力改變貧困的處境","option_b":"老太太受限於年紀而無法實現夢想","option_c":"老太太擁有的衝勁與熱忱","option_d":"對老太太年輕時的旅行經驗深感佩服","answer":"C","analysis":"","hint":""},{"no":"240","subject":"國文","grade":"七年級","exam":"第三次段考","unit":"L7~10","source":"康軒B卷","question":"關於另一個春天一文的寫作手法，下列敘述何者正確？","option_a":"僅描寫老太太的外在形貌，建立其人物形象","option_b":"運用插敘手法，描述作者在不同地點遇到老太太的情況","option_c":"詳細描述旅途中各個景點的背景知識，藉此加深文章的內涵","option_d":"善用對話刻畫人物，也表現彼此溫暖的情誼","answer":"D","analysis":"","hint":""},{"no":"241","subject":"國文","grade":"七年級","exam":"第三次段考","unit":"L7~10","source":"康軒B卷","question":"「常常人家待我們好，我們並不珍惜，或者珍惜得太淺，日久便成了天經地義了。慢慢的忘記做人的禮數，忘於回饋感激。」這段文字旨在說明我們往往如何看待他人的善意？","option_a":"客氣謙讓，再三推辭","option_b":"衷心感謝，銘記在心","option_c":"理所當然，習以為常","option_d":"挑三揀四，忘恩負義","answer":"C","analysis":"","hint":""},{"no":"242","subject":"國文","grade":"七年級","exam":"第三次段考","unit":"L7~10","source":"康軒B卷","question":"陳之藩認為謝天就是要「常常感謝心」。下列諺語，何者具有同樣的含義？","option_a":"留得青山在，不怕沒柴燒","option_b":"一粥一飯，當思來處不易","option_c":"人無千日好，花無百日紅","option_d":"射人先射馬，擒賊先擒王","answer":"B","analysis":"","hint":""},{"no":"243","subject":"國文","grade":"七年級","exam":"第三次段考","unit":"L7~10","source":"康軒B卷","question":"「老年人相信自己，中年人患得患失，青年人自認什麼都懂。」根據這段文字，下列說明何者正確？","option_a":"初出茅廬的年輕人，容易驕傲自滿","option_b":"中年人有足夠閱歷，喜歡針砭社會事","option_c":"老年人思考純粹，不容易相信別人","option_d":"若無經過困苦磨練，難以有所成長","answer":"A","analysis":"","hint":""},{"no":"244","subject":"國文","grade":"七年級","exam":"第三次段考","unit":"L7~10","source":"康軒B卷","question":"「我認為有志從事寫作，第一要有廣大的同情心，時時體驗人情，觀察物象，然後以溫柔厚之筆，寫出真善美的文章。」（琦君）根據這段文字，想要效法琦君的寫作態度，動筆前應該怎麼做？","option_a":"多閱讀傳遞真善美精神的文章","option_b":"培養開闊的眼界，客觀理性的觀察世間之美","option_c":"杜絕冷漠，試著理解他人的感受","option_d":"保持心境的平和，不受外在影響","answer":"C","analysis":"","hint":""},{"no":"245","subject":"國文","grade":"七年級","exam":"第三次段考","unit":"L7~10","source":"康軒B卷","question":"「感受旅途中的景致，比到達終點更加吸引人。」下列何者最能詮釋這句話的精神？","option_a":"享受旅行沿途的風景，使得心靈豐富無比","option_b":"世界是一本書，不旅行的人只讀了一頁","option_c":"生活旅行化，理想是旅行的方向","option_d":"旅行是恢復青春活力的源泉","answer":"A","analysis":"","hint":""},{"no":"246","subject":"國文","grade":"七年級","exam":"第三次段考","unit":"L7~10","source":"康軒B卷","question":"「既然今天／沒人認得星星一顆／那麼明日／何妨效皓月一輪」這段詩句的意旨與下列何者最相近？","option_a":"烏雲蔽日，順應天道，以閒暇歸隱山林，悠閒度日","option_b":"懷才不遇要充實自我，以開創屬於自己的舞臺","option_c":"有多少力氣就做多少事，切勿將責任全部攬上身","option_d":"認清自己的興趣，方能規畫最適合的生涯","answer":"B","analysis":"","hint":""},{"no":"247","subject":"國文","grade":"七年級","exam":"第三次段考","unit":"L7~10","source":"康軒B卷","question":"「行程特色餐廳：黃金牧場無人不曉，明洞最美味的烤肉，受外國遊客喜歡的高人氣餐廳，帶給您難忘的烤肉饗宴。服務人員會測定烤盤溫度，在最佳的溫度下，烤出美味鮮嫩的肉品。店內裝潢以黃金原木色調為主，營造出明亮溫暖的用餐環境。」根據這段旅遊資訊，下列敘述何者正確？","option_a":"服務人員會主動測定烤盤溫度，確保烹調食物的最佳條件","option_b":"該店受遊客歡迎的原因是交通方便而且風景絕佳","option_c":"店內裝潢低調，為營造氣氛而減少照明","option_d":"該店設點於明洞一帶，並提供烤肉與火鍋","answer":"A","analysis":"","hint":""},{"no":"248","subject":"國文","grade":"七年級","exam":"第三次段考","unit":"L7~10","source":"康軒B卷","question":"「夫善游者溺，善騎者墜，各以其所好，反自為禍。」（淮南子）這段文字旨在提醒人下列何事？","option_a":"命中注定，一物剋一物","option_b":"謙遜謹慎，勿恃才傲物","option_c":"過猶不及，應恰如其分","option_d":"善惡有報，不可為非作歹","answer":"B","analysis":"","hint":""},{"no":"249","subject":"國文","grade":"七年級","exam":"第三次段考","unit":"L7~10","source":"康軒B卷","question":"「子云：『君子貴人而賤己，先人而後己，則民作讓。』故稱人之君曰君，＿＿＿＿。」（禮記）根據文意，畫線處填入下列何者最恰當？","option_a":"稱己之君曰聖上","option_b":"君之稱人曰陛下","option_c":"稱君之人曰賢德","option_d":"自稱其君曰寡君","answer":"D","analysis":"","hint":""},{"no":"250","subject":"國文","grade":"七年級","exam":"第三次段考","unit":"L7~10","source":"康軒B卷","question":"「社會愈富裕，沒感覺的人似乎愈來愈多。沒感覺其實是心靈貧困的徵候，因為心靈的富有不在於擁有許多、經歷許多，而在於感覺許多。無法有許多感覺的人，就是心靈上的窮人，他們是富裕社會裡另一種常見的新貧階級。」（王溢嘉）這段文字的主旨為何？","option_a":"不用在乎他人的感覺，順從自己就好","option_b":"社會上窮困的人無法獲得富裕的心靈","option_c":"富裕社會的新貧階級，指的是知識不足的人","option_d":"喚醒知覺，才能成為一個心靈富裕的人","answer":"D","analysis":"","hint":""},{"no":"1","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"A卷L5","question":"The car _____ not there yesterday morning.","option_a":"is","option_b":"was","option_c":"be","option_d":"were","answer":"B","analysis":"主詞 car 單數，過去式 be 用 was。","hint":"單數+was"},{"no":"2","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"A卷L5","question":"A: _____ there many fish in the sea years ago? B: Yes. Many people fished（釣魚）here.","option_a":"Is","option_b":"Are","option_c":"Was","option_d":"Were","answer":"D","analysis":"fish 為複數且過去式，用 Were。","hint":"複數過去+Were"},{"no":"3","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"A卷L5","question":"A: Were you at the Great Movie Theater the day before yesterday? B: No, I _____, but my friends _____.","option_a":"was; weren't","option_b":"wasn't; were","option_c":"were; wasn't","option_d":"weren't; was","answer":"B","analysis":"主詞 I 配 wasn't，friends 為複數配 were。","hint":"I wasn't/復were"},{"no":"4","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"A卷L5","question":"My parents _____ in the USA _____ last year.","option_a":"was; in","option_b":"were; in","option_c":"was; ×","option_d":"were; ×","answer":"D","analysis":"parents 為複數用 were；last year 前不加介系詞。","hint":"複數were+裸時間"},{"no":"5","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"A卷L5","question":"A: _____ you clean your bedroom? B: Yes. It's very clean now.","option_a":"Can","option_b":"Are","option_c":"Did","option_d":"Were","answer":"C","analysis":"一般動詞過去式疑問句用 Did。","hint":"過去式問句Did"},{"no":"6","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"A卷L5","question":"Mr. and Mrs. Bateman _____ our teachers before, but they _____ now.","option_a":"are; aren't","option_b":"were; aren't","option_c":"are; weren't","option_d":"were; weren't","answer":"B","analysis":"以前用 were，現在用 aren't。","hint":"過去were現在aren't"},{"no":"7","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"A卷L5","question":"Casey didn't _____ TV last night. He was busy with his homework.","option_a":"watch","option_b":"watches","option_c":"watching","option_d":"watched","answer":"A","analysis":"didn't 後接原形動詞 watch。","hint":"didn't+原形"},{"no":"8","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"A卷L5","question":"A: _____ were your brothers? B: At the park with their friends.","option_a":"Who","option_b":"How","option_c":"Which","option_d":"Where","answer":"D","analysis":"答地點（At the park），故問 Where。","hint":"問地點"},{"no":"9","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"A卷L5","question":"A: There's mud（泥巴）on your car. Didn't you wash it this afternoon? B: Yes, I _____. Where did the mud come from?","option_a":"did","option_b":"didn't","option_c":"wasn't","option_d":"washed","answer":"A","analysis":"否定疑問句肯定回答用 Yes, I did。","hint":"肯答用did"},{"no":"10","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"A卷L5","question":"The baby bird was an egg not long _____.","option_a":"ago","option_b":"after","option_c":"later","option_d":"then","answer":"A","analysis":"「不久前」用 not long ago。","hint":"ago=以前"},{"no":"11","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"A卷L5","question":"A: What _____ you do in your room? B: I painted and listened to music.","option_a":"do","option_b":"did","option_c":"can","option_d":"were","answer":"B","analysis":"回答為過去式，問句用 did。","hint":"過去式問句"},{"no":"12","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"A卷L5","question":"A: Did you enjoy St. Louis Mountain? B: Yes! I _____ to the top（頂部）, and it _____ beautiful up there.","option_a":"hike; is","option_b":"hiking; is","option_c":"hiked; was","option_d":"am hiking; was","answer":"C","analysis":"過去動作用 hiked，連綴動詞用 was。","hint":"過去 hiked+was"},{"no":"13","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"A卷L5","question":"A: How was the dinner with Vincent? B: ____________ We both enjoyed it.","option_a":"It was good.","option_b":"I burned the food.","option_c":"The dinner is ready.","option_d":"We can picnic at the park.","answer":"A","analysis":"答晚餐感受用 It was good。","hint":"答感受"},{"no":"14","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"A卷L5","question":"A: ____________ B: I visited a museum.","option_a":"Where was the museum?","option_b":"What did you do last Friday?","option_c":"Were you at the museum, too?","option_d":"When did you go to the museum?","answer":"B","analysis":"答過去做的事，故問 What did you do。","hint":"問做什麼"},{"no":"15","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"A卷L5","question":"A: Flora didn't come home today. B: ____________ Oh, she's at May's house tonight（今晚）.","option_a":"What's next?","option_b":"What happened?","option_c":"How did it happen?","option_d":"How was everything?","answer":"B","analysis":"得知異狀問 What happened。","hint":"問怎麼了"},{"no":"16","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"A卷L5","question":"A: Where was Wendy at that time? B: ____________","option_a":"She was busy then.","option_b":"She wasn't on the hill.","option_c":"She is camping by the river.","option_d":"She was at her friend's place.","answer":"D","analysis":"問地點用過去式 was at 答地點。","hint":"答過去地點"},{"no":"17","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"A卷L5","question":"A: _____ did you play with at school today? B: Mike and Taylor.","option_a":"How","option_b":"Who","option_c":"What","option_d":"When","answer":"B","analysis":"答人名 Mike and Taylor，故問 Who。","hint":"問是誰"},{"no":"18","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"A卷L5","question":"I usually visited my grandma on the weekend, but my sister never _____.","option_a":"was","option_b":"did","option_c":"wasn't","option_d":"didn't","answer":"B","analysis":"代替前述一般動詞過去式用 did。","hint":"代動詞用did"},{"no":"19","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"A卷L5","question":"A: What happened _____ Ruth? She is so sad. B: Her mouse died.","option_a":"at","option_b":"in","option_c":"on","option_d":"to","answer":"D","analysis":"happen to + 人/事 表「發生在…」。","hint":"happen to+人"},{"no":"20","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"A卷L5","question":"A: This park is like a forest. There are over ten _____ of trees. B: Yeah, it's big and beautiful.","option_a":"rows","option_b":"ways","option_c":"stops","option_d":"plants","answer":"A","analysis":"「一排排的樹」用 rows of trees。","hint":"rows of trees"},{"no":"21","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"B卷L5","question":"I was at Mary's place an hour _____. We watched a movie together.","option_a":"before","option_b":"last","option_c":"ago","option_d":"today","answer":"C","analysis":"「一小時前」用 an hour ago。","hint":"ago=以前"},{"no":"22","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"B卷L5","question":"I didn't watch TV on Friday, but my sister _____.","option_a":"does","option_b":"watches","option_c":"did","option_d":"watched","answer":"C","analysis":"代替前述肯定的一般動詞過去式用 did。","hint":"代動詞用did"},{"no":"23","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"B卷L5","question":"A: When did we visit the art museum? I miss it already（已經）. B: _____.","option_a":"Now","option_b":"Later","option_c":"This Saturday","option_d":"The day before yesterday","answer":"D","analysis":"問 When did，須答過去時間。","hint":"過去時間"},{"no":"24","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"B卷L5","question":"It _____ very hot this year, but it _____ not hot two years ago.","option_a":"is; did","option_b":"is; was","option_c":"was; is","option_d":"was; did","answer":"B","analysis":"this year 用 is；two years ago 用 was。","hint":"現是+過去was"},{"no":"25","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"B卷L5","question":"A: You didn't talk to Ian about school. B: I was too busy. Christmas is this Thursday, so I _____ to him then.","option_a":"did","option_b":"can talk","option_c":"talked","option_d":"didn't talk","answer":"B","analysis":"未來打算「可以跟他談」，用 can talk。","hint":"未來can+原形"},{"no":"26","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"B卷L5","question":"I climbed a mountain with my friends last _____. We enjoyed it very much.","option_a":"October","option_b":"morning","option_c":"month","option_d":"years","answer":"A","analysis":"last 後接時間名詞，October 為月份。","hint":"last+月份"},{"no":"27","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"B卷L5","question":"A: Were you at your house at six this evening? B: No, I _____.","option_a":"wasn't","option_b":"am not","option_c":"weren't","option_d":"didn't","answer":"A","analysis":"主詞 I 過去式否定用 wasn't。","hint":"I+wasn't"},{"no":"28","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"B卷L5","question":"Jessie loves this river. She camps _____ it once a year.","option_a":"on","option_b":"in","option_c":"by","option_d":"above","answer":"C","analysis":"「在河邊」露營用 by（在…旁）。","hint":"河邊用 by"},{"no":"29","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"B卷L5","question":"A: What _____ this morning? B: I practiced the guitar at home.","option_a":"were you","option_b":"can you do","option_c":"did you do","option_d":"are you doing","answer":"C","analysis":"答過去做的事，問句用 did you do。","hint":"過去式問句"},{"no":"30","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"B卷L5","question":"Didn't Annie _____ you a few days ago?","option_a":"visits","option_b":"visited","option_c":"visiting","option_d":"visit","answer":"D","analysis":"Didn't 後接原形動詞 visit。","hint":"Didn't+原形"},{"no":"31","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"B卷L5","question":"The music was great, and everyone _____ about it after the concert.","option_a":"talks","option_b":"talked","option_c":"talking","option_d":"talking","answer":"B","analysis":"演唱會後為過去式，動詞用 talked。","hint":"過去式 talked"},{"no":"32","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"B卷L5","question":"A: ____________ B: I was with my cousin.","option_a":"When were you there?","option_b":"How were you?","option_c":"Where was your cousin?","option_d":"Who were you with?","answer":"D","analysis":"答和某人一起，故問 Who were you with。","hint":"問跟誰"},{"no":"33","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"B卷L5","question":"A: ____________ B: The coffee shop is seldom busy at this time.","option_a":"We don't have time for coffee.","option_b":"There are only a few people inside.","option_c":"My friend is a clerk in the shop.","option_d":"There's a long wait for a table for two.","answer":"B","analysis":"對應「店常很少人」，前句應講店裡人少。","hint":"店裡人少"},{"no":"34","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"B卷L5","question":"A: Kristen was very sad at school today. ____________ B: Her dog is dead.","option_a":"Where was she?","option_b":"How come?","option_c":"What did you do?","option_d":"Was she dead?","answer":"B","analysis":"問原因用 How come（怎麼會這樣）。","hint":"問原因"},{"no":"35","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"B卷L5","question":"A: Look at these pictures, Mom. You play basketball? B: That was a long time ago. ____________","option_a":"It was yesterday.","option_b":"I practice basketball now.","option_c":"I can't do that now.","option_d":"Basketball players make a lot of money.","answer":"C","analysis":"已年長，現在沒辦法打，故 I can't do that now。","hint":"現在不行"},{"no":"36","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"C卷L5","question":"Peter _____ by the lake with his friends last weekend.","option_a":"camps","option_b":"camped","option_c":"is camping","option_d":"camp","answer":"B","analysis":"last weekend 為過去，動詞用 camped。","hint":"過去式 camped"},{"no":"37","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"C卷L5","question":"Vivian didn't _____ English at home yesterday.","option_a":"study","option_b":"studying","option_c":"studied","option_d":"is studying","answer":"A","analysis":"didn't 後接原形動詞 study。","hint":"didn't+原形"},{"no":"38","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"C卷L5","question":"Samuel _____ a lot before the game last month, but Joseph _____.","option_a":"practices; doesn't","option_b":"is practicing; doesn't","option_c":"practiced; didn't","option_d":"practiced; doesn't","answer":"C","analysis":"last month 為過去，皆用過去式。","hint":"過去式皆 did"},{"no":"39","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"C卷L5","question":"A: What _____ you do this morning? B: I exercised and played the piano.","option_a":"do","option_b":"did","option_c":"were","option_d":"are","answer":"B","analysis":"答過去式，問句用 did。","hint":"過去式問句"},{"no":"40","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"C卷L5","question":"A: Who _____ you with last night? B: I _____ with my dog.","option_a":"are; was","option_b":"were; am","option_c":"are; am","option_d":"were; was","answer":"D","analysis":"you 配 were，I 配 was。","hint":"you were/I was"},{"no":"41","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"C卷L5","question":"A: Did Miranda _____ the house? B: No, she _____.","option_a":"cleans; doesn't","option_b":"cleaned; didn't","option_c":"cleaning; doesn't","option_d":"clean; didn't","answer":"D","analysis":"Did 後接原形，否定簡答用 didn't。","hint":"Did+原形/didn't"},{"no":"42","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"C卷L5","question":"A: _____ did you last go to a museum? B: A few weeks ago.","option_a":"Which","option_b":"Where","option_c":"When","option_d":"What","answer":"C","analysis":"答時間 A few weeks ago，問 When。","hint":"問時間"},{"no":"43","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"C卷L5","question":"A: _____ Janet a doctor before? B: Yes, she _____.","option_a":"Was; was","option_b":"Is; was","option_c":"Were; is","option_d":"Were; was","answer":"A","analysis":"主詞 Janet 過去式用 Was/was。","hint":"Janet+was"},{"no":"44","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"C卷L5","question":"Colin's rabbit _____ last Monday. He is very sad.","option_a":"died","option_b":"dead","option_c":"die","option_d":"is dead","answer":"A","analysis":"last Monday 為過去，動詞用 died。","hint":"過去式 died"},{"no":"45","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"C卷L5","question":"My grandpa was an art teacher 20 years _____.","option_a":"before","option_b":"ago","option_c":"then","option_d":"last","answer":"B","analysis":"「20 年前」用 20 years ago。","hint":"ago=以前"},{"no":"46","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"C卷L5","question":"A: ____________ B: It died last Saturday.","option_a":"Was your dog in trouble?","option_b":"What happened to your dog?","option_c":"When did you walk your dog?","option_d":"Where were you and your dog last weekend?","answer":"B","analysis":"答狗死了，故問 What happened to your dog。","hint":"問怎麼了"},{"no":"47","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"C卷L5","question":"A: When did Thomas eat the burger on the table? B: ____________","option_a":"In the kitchen.","option_b":"Fifteen minutes ago.","option_c":"It was warm yesterday.","option_d":"That was really yummy.","answer":"B","analysis":"問 When，答過去時間 Fifteen minutes ago。","hint":"答時間"},{"no":"48","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"C卷L5","question":"A: ____________ B: He visited an island and enjoyed it a lot.","option_a":"Was Marcus on the island then?","option_b":"What did Marcus do last weekend?","option_c":"Did Marcus go to the island at that time?","option_d":"When did Marcus go to the island?","answer":"B","analysis":"答過去活動，故問 What did he do。","hint":"問做什麼"},{"no":"49","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"C卷L5","question":"A: How was the concert yesterday? B: ____________","option_a":"It was really great.","option_b":"Were you at the concert then?","option_c":"It was on January 22.","option_d":"Don't you see the singer on the stage?","answer":"A","analysis":"How was 答感受 It was really great。","hint":"答感受"},{"no":"50","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L5","source":"C卷L5","question":"A: ____________ B: Yes. There were a lot of trees at this beach.","option_a":"Were there a lot of trees here?","option_b":"Did Shelly plant a lot of trees?","option_c":"When did Emma go to the beach?","option_d":"Were there beautiful beaches on the island?","answer":"A","analysis":"答 There were 樹很多，問 Were there。","hint":"Were there+複數"},{"no":"51","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"A卷L6","question":"A: Where's Katherine? She's not in her office. B: She _____ to her uncle's company.","option_a":"go","option_b":"goes","option_c":"went","option_d":"going","answer":"C","analysis":"答她不在辦公室，過去動作用 went。","hint":"過去式 went"},{"no":"52","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"A卷L6","question":"The chocolate cake was so good, so I _____ it all.","option_a":"eat","option_b":"ate","option_c":"can eat","option_d":"am eating","answer":"B","analysis":"was 為過去，後句也用過去式 ate。","hint":"過去式 ate"},{"no":"53","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"A卷L6","question":"A: How _____ Cindy and her husband meet? B: They met at a friend's party. And I was the friend. A: Cool!","option_a":"do","option_b":"can","option_c":"did","option_d":"were","answer":"C","analysis":"答 They met（過去式），問句用 did。","hint":"過去式問句"},{"no":"54","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"A卷L6","question":"A: Did John _____ here yesterday? B: Yes, he _____ with his aunt.","option_a":"came; came","option_b":"come; came","option_c":"came; comes","option_d":"come; comes","answer":"B","analysis":"Did 後接原形 come，主句過去式 came。","hint":"Did+原形/過去式"},{"no":"55","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"A卷L6","question":"Brad read the book, Green Eyes, many times, but his sister _____.","option_a":"didn't","option_b":"isn't","option_c":"wasn't","option_d":"doesn't","answer":"A","analysis":"代替前述一般動詞過去式，否定用 didn't。","hint":"代動詞 didn't"},{"no":"56","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"A卷L6","question":"A: ____________ How was the trip? B: I had a good time; the sights were great, and the food was yummy.","option_a":"Safe travels!","option_b":"Welcome home!","option_c":"Have a good day!","option_d":"Enjoy your holiday!","answer":"B","analysis":"對方剛旅行回家，說 Welcome home。","hint":"歡迎回家"},{"no":"57","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"A卷L6","question":"A: These pictures are works of art. ____________ B: The little girl over there did. A: Wow!","option_a":"Who drew them?","option_b":"How did you like them?","option_c":"When did you put them here?","option_d":"Why didn't I see them before?","answer":"A","analysis":"答某人畫的，故問 Who drew them。","hint":"問是誰畫"},{"no":"58","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"A卷L6","question":"A: ____________ It's so cute. B: I bought it from the gift shop in the zoo.","option_a":"How much is this cup?","option_b":"Where did you get the cup?","option_c":"Why didn't you buy that cup?","option_d":"What do you think of the cup?","answer":"B","analysis":"答購買地點，故問 Where did you get。","hint":"問哪裡買"},{"no":"59","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"A卷L6","question":"A: Let's climb to the top（頂部）. It must be（一定是）beautiful up there. B: ____________ I went up there with my sister a few days ago. It was just okay. A: I see.","option_a":"How cool!","option_b":"What else?","option_c":"How was it?","option_d":"You know what?","answer":"D","analysis":"想告知新事情用 You know what。","hint":"你知道嗎"},{"no":"60","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"A卷L6","question":"A: Let's go to the movies this weekend. What do you think? B: Great. What's in _____ now? A: Let's check.","option_a":"markets","option_b":"temples","option_c":"theaters","option_d":"bookstores","answer":"C","analysis":"看電影所在地是電影院（theaters）。","hint":"電影院"},{"no":"61","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"A卷L6","question":"A: _____ sugar and flour,  school.","option_a":"live","option_b":"lived","option_c":"living","option_d":"am living","answer":"B","analysis":"before high school 為過去，動詞用 lived。","hint":"過去式 lived"},{"no":"68","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"A卷L56","question":"My dad didn't go to the church, but my mom _____.","option_a":"is","option_b":"did","option_c":"was","option_d":"does","answer":"B","analysis":"代替前述一般動詞過去式肯定用 did。","hint":"代動詞用 did"},{"no":"69","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"A卷L56","question":"Kim went to the flower shop an hour _____. Now she is resting at home.","option_a":"ago","option_b":"then","option_c":"later","option_d":"still","answer":"A","analysis":"「一小時前」用 an hour ago。","hint":"ago=以前"},{"no":"70","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"A卷L56","question":"A: Where _____ Olive last week? B: In the mountains. She camped for a week.","option_a":"is","option_b":"did","option_c":"was","option_d":"does","answer":"C","analysis":"last week 過去，主詞 Olive 用 was。","hint":"過去式 was"},{"no":"71","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"A卷L56","question":"I couldn't buy anything at the market because I _____ my money this morning.","option_a":"lost","option_b":"lose","option_c":"can lose","option_d":"am losing","answer":"A","analysis":"this morning 已過去，動詞用 lost。","hint":"過去式 lost"},{"no":"72","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"A卷L56","question":"A: Did you see Joseph at the park last night? B: Yes, but I could _____ wrong（錯誤的）. It was dark.","option_a":"×","option_b":"be","option_c":"am","option_d":"was","answer":"B","analysis":"could 後接原形動詞 be。","hint":"could+be"},{"no":"73","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"A卷L56","question":"A: ____________ B: We swam and walked around the beach.","option_a":"What did you do at the beach?","option_b":"Why didn't you like the beach?","option_c":"When did you go to the beach?","option_d":"Who were you with at the beach?","answer":"A","analysis":"答過去做的活動，故問 What did you do。","hint":"問做什麼"},{"no":"74","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"A卷L56","question":"A: Where were you at 6 p.m. yesterday? B: ____________","option_a":"I was late again.","option_b":"I was eight then.","option_c":"I was on my way home.","option_d":"I didn't visit my grandma.","answer":"C","analysis":"答地點，I was on my way home。","hint":"答過去地點"},{"no":"75","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"A卷L56","question":"A: I can't join the school baseball team. B: ____________ You're good at baseball. A: I don't have time. I help my dad on the farm every day.","option_a":"How come?","option_b":"Isn't that cool?","option_c":"You know what?","option_d":"How do you like it?","answer":"A","analysis":"驚訝詢問原因用 How come。","hint":"問原因"},{"no":"76","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"A卷L56","question":"A: ____________ B: I turned it off because the baby is sleeping.","option_a":"Did the baby cry?","option_b":"Why did the music stop?","option_c":"What happened to the baby?","option_d":"Did you read a story to the baby?","answer":"B","analysis":"答原因（嬰兒在睡），故問音樂停的原因。","hint":"問為何停"},{"no":"77","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"A卷L56","question":"We didn't have food with us at that time, so we didn't _____ at the park.","option_a":"picnic","option_b":"climb","option_c":"row","option_d":"fall","answer":"A","analysis":"沒帶食物所以無法野餐（picnic）。","hint":"野餐=picnic"},{"no":"78","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"B卷L6","question":"It was my birthday yesterday, and my brother _____ a cake for me. It was really yummy.","option_a":"can make","option_b":"makes","option_c":"made","option_d":"is making","answer":"C","analysis":"yesterday 為過去，動詞用 made。","hint":"過去式 made"},{"no":"79","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"B卷L6","question":"The boy _____ everything on his plate because he was hungry.","option_a":"eat","option_b":"ate","option_c":"eats","option_d":"is eating","answer":"B","analysis":"was hungry 為過去，動詞用 ate。","hint":"過去式 ate"},{"no":"80","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"B卷L6","question":"A: Where were you _____ the day last Sunday? B: I was at church.","option_a":"on","option_b":"at","option_c":"from","option_d":"during","answer":"D","analysis":"「在那天當中」用 during the day。","hint":"during=期間"},{"no":"81","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"B卷L6","question":"In the video, the singer talked about the story _____ her new song \"Birthday Cake.\" It's about her thirtieth birthday.","option_a":"behind","option_b":"besides","option_c":"like","option_d":"during","answer":"A","analysis":"「歌曲背後的故事」用 behind。","hint":"背後=behind"},{"no":"82","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"B卷L6","question":"The woman can speak English. She learned it _____.","option_a":"now","option_b":"then","option_c":"at that time","option_d":"at a young age","answer":"D","analysis":"「在年輕時」用 at a young age。","hint":"at a young age"},{"no":"83","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"B卷L6","question":"A: Why _____ Jamie go to the movies with you last Sunday? B: Because she _____ to the doctor.","option_a":"did; went","option_b":"didn't; goes","option_c":"didn't; went","option_d":"did; goes","answer":"C","analysis":"答原因看醫生，故問 Why didn't；過去式 went。","hint":"didn't+原形/went"},{"no":"84","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"B卷L6","question":"Holly didn't _____ a rest on the bus because there were too many people.","option_a":"needed","option_b":"took","option_c":"need","option_d":"take","answer":"D","analysis":"didn't 後接原形動詞，take a rest（休息）。","hint":"take a rest"},{"no":"85","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"B卷L6","question":"We traveled all the way to the famous restaurant. _____, we couldn't eat there because it wasn't open.","option_a":"Sadly","option_b":"Luckily","option_c":"In this way","option_d":"Little by little","answer":"A","analysis":"餐廳沒開很可惜，用 Sadly。","hint":"可惜=Sadly"},{"no":"86","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"B卷L6","question":"A: What did you two do all day? B: We saw a movie. _____ that, we also visited a flea market.","option_a":"During","option_b":"Besides","option_c":"Thanks to","option_d":"Because of","answer":"B","analysis":"「除此之外」用 Besides。","hint":"除外=Besides"},{"no":"87","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"B卷L6","question":"A: Why is the cat under the sofa? B: He's hiding _____ everyone because he doesn't like people.","option_a":"×","option_b":"by","option_c":"from","option_d":"with","answer":"C","analysis":"「躲避某人」用 hide from。","hint":"hide from"},{"no":"88","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"B卷L6","question":"A: It's not a long way from our hotel to the famous temple. ____________ B: Sure. And you know what? We can just walk there.","option_a":"Let's go see all the sights.","option_b":"I'm on my way to the temple.","option_c":"Why don't we take a trip there?","option_d":"I'm not tired, so let's just walk.","answer":"C","analysis":"提議去那裡，用 Why don't we。","hint":"提議句"},{"no":"89","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"B卷L6","question":"A: At what age did he go to the USA? B: ____________","option_a":"He is only nine.","option_b":"He went there five years ago.","option_c":"He was twenty-two years old then.","option_d":"He lived there for three years.","answer":"C","analysis":"答幾歲時去，用 He was 22 years old then。","hint":"答年齡"},{"no":"90","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"B卷L6","question":"A: Why are you here? Don't you have a meeting（會議）? B: I just came from there. ____________, so I'm home early.","option_a":"I don't have a meeting","option_b":"The meeting didn't last long","option_c":"I'm late for the meeting","option_d":"The meeting is next Wednesday","answer":"B","analysis":"早回家因會議很短，The meeting didn't last long。","hint":"會議短"},{"no":"91","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"B卷L6","question":"A: What do you think about Rose? B: ____________ I can't live without（沒有）her.","option_a":"She's the love of my life.","option_b":"We were so in love before.","option_c":"Her love is never enough for me.","option_d":"My love for her died after some time.","answer":"A","analysis":"不能沒有她，故說 She's the love of my life。","hint":"我的最愛"},{"no":"92","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"B卷L6","question":"A: You went to that restaurant, right? ____________ B: It was good. The food was yummy.","option_a":"What did you get?","option_b":"Did they sell food?","option_c":"Where did you go?","option_d":"How did you like it?","answer":"D","analysis":"答感受 It was good，問 How did you like it。","hint":"問感受"},{"no":"93","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"B卷L56","question":"A: I didn't see you at work yesterday afternoon. Where _____ you at that time? B: At the beach.","option_a":"do","option_b":"did","option_c":"are","option_d":"were","answer":"D","analysis":"at that time 過去時間，主詞 you 用 were。","hint":"you+were"},{"no":"94","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"B卷L56","question":"A: Did you go to the theater yesterday? B: No, I _____. I was home all day.","option_a":"did","option_b":"didn't","option_c":"was","option_d":"wasn't","answer":"B","analysis":"Did 問句否定簡答用 didn't。","hint":"Did/didn't"},{"no":"95","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"B卷L56","question":"A: Is your mother here? B: No. She went to the market _____.","option_a":"now","option_b":"then","option_c":"an hour ago","option_d":"every Thursday","answer":"C","analysis":"went 為過去式，搭過去時間 an hour ago。","hint":"過去+ago"},{"no":"96","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"B卷L56","question":"A: Do you know Sam Adams? B: No, but I _____ his sister Amy. I _____ her at a bookstore the other day.","option_a":"know; met","option_b":"know; meet","option_c":"knew; met","option_d":"knew; meet","answer":"A","analysis":"現在認識用 know；過去遇見用 met。","hint":"know/met"},{"no":"97","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"B卷L56","question":"A: John was sad because he couldn't go to the party. B: _____ he there? I saw him at the party.","option_a":"Didn't","option_b":"Was","option_c":"Were","option_d":"Wasn't","answer":"D","analysis":"否定疑問反問，主詞 he 過去式用 Wasn't。","hint":"Wasn't+he"},{"no":"98","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"B卷L56","question":"Jerry died _____ a young age. He was only twenty-one then.","option_a":"on","option_b":"in","option_c":"at","option_d":"for","answer":"C","analysis":"「在年輕時」用 at a young age。","hint":"at+年齡"},{"no":"99","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"B卷L56","question":"Come out, Jay! Why are you hiding _____ me?","option_a":"to","option_b":"at","option_c":"on","option_d":"from","answer":"D","analysis":"躲避某人用 hide from。","hint":"hide from"},{"no":"100","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"B卷L56","question":"I _____ have breakfast this morning. I _____ very hungry now.","option_a":"don't; am","option_b":"don't; was","option_c":"didn't; am","option_d":"didn't; was","answer":"C","analysis":"this morning 已過去用 didn't；now 用 am。","hint":"didn't+am"},{"no":"101","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"B卷L56","question":"A: _____ milk, what else do we need? B: We also need some apples.","option_a":"Just","option_b":"Besides","option_c":"Because","option_d":"Then","answer":"B","analysis":"「除了…還」用 Besides。","hint":"除外=Besides"},{"no":"102","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"B卷L56","question":"A: Where was Alice yesterday evening? B: She was at home _____.","option_a":"ago","option_b":"then","option_c":"just","option_d":"later","answer":"B","analysis":"「那時候」用 then。","hint":"那時=then"},{"no":"103","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"B卷L56","question":"My brother fought with his teacher today. He is _____ trouble.","option_a":"on","option_b":"at","option_c":"for","option_d":"in","answer":"D","analysis":"「有麻煩」固定用 in trouble。","hint":"in trouble"},{"no":"104","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"B卷L56","question":"A: Diane's coffee shop is always full of people. B: Oh, yes. ____________","option_a":"The shop is never busy.","option_b":"She's making a lot of money.","option_c":"The shop is not doing all right.","option_d":"She lost everything, so she's selling the shop.","answer":"B","analysis":"店裡總是滿座，所以賺很多錢。","hint":"生意好"},{"no":"105","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"B卷L56","question":"A: How was your day with Jane? B: Great! ____________ She treated me to some yummy pizza.","option_a":"We didn't visit all the sights.","option_b":"We were on the way to the temple.","option_c":"We had a great meal at a restaurant.","option_d":"Let's take a trip to a department store.","answer":"C","analysis":"她請吃披薩，故我們在餐廳吃了大餐。","hint":"吃大餐"},{"no":"106","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"B卷L56","question":"A: Jennifer is crying. How come? B: ____________","option_a":"Yes, she's crying.","option_b":"Right. Let's stop her.","option_c":"She just fell off the chair.","option_d":"No, she didn't come to school today.","answer":"C","analysis":"答原因（從椅子上跌下來）。","hint":"答原因"},{"no":"107","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"B卷L56","question":"A: ____________ It was on the table. B: Sorry. I drank your hot tea because I was cold.","option_a":"Were you cold?","option_b":"Did you make some tea?","option_c":"What did you get from the shop?","option_d":"What happened to my tea?","answer":"D","analysis":"對方喝了我的茶，問 What happened to my tea。","hint":"問怎麼了"},{"no":"108","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"B卷L56","question":"A: Is this singer famous? B: No. ____________","option_a":"He's very popular in the USA.","option_b":"Everyone knows him.","option_c":"Only a few people know about him.","option_d":"A lot of people like him.","answer":"C","analysis":"答 No 表示不有名，故僅少數人知道。","hint":"少數人知"},{"no":"109","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"C卷L6","question":"It was rainy, so only a few people _____ to the park.","option_a":"go","option_b":"goes","option_c":"going","option_d":"went","answer":"D","analysis":"was rainy 為過去，動詞用 went。","hint":"過去式 went"},{"no":"110","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"C卷L6","question":"Tiana didn't _____ to the library yesterday. She _____ to the museum.","option_a":"went; went","option_b":"go; go","option_c":"go; went","option_d":"went; go","answer":"C","analysis":"didn't 後接原形 go；後句過去式 went。","hint":"didn't+原形/went"},{"no":"111","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"C卷L6","question":"A: Didn't you _____ your homework last night? B: No, I _____ do it.","option_a":"did; did","option_b":"do; did","option_c":"did; didn't","option_d":"do; didn't","answer":"D","analysis":"Didn't 後接原形；簡答否定用 didn't。","hint":"Didn't+原形/didn't"},{"no":"112","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"C卷L6","question":"James _____ a lot of food because he was very hungry.","option_a":"ate","option_b":"eat","option_c":"eats","option_d":"is eating","answer":"A","analysis":"was 為過去，動詞用 ate。","hint":"過去式 ate"},{"no":"113","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"C卷L6","question":"Ava only _____ for three hours last night. She is tired now.","option_a":"sleep","option_b":"slept","option_c":"sleeps","option_d":"sleeping","answer":"B","analysis":"last night 為過去，動詞用 slept。","hint":"過去式 slept"},{"no":"114","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"C卷L6","question":"It was Christmas yesterday, and my family _____ a big meal together.","option_a":"has","option_b":"had","option_c":"have","option_d":"is having","answer":"B","analysis":"yesterday 為過去，動詞用 had。","hint":"過去式 had"},{"no":"115","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"C卷L6","question":"Janice _____ a book at that bookstore yesterday.","option_a":"bought","option_b":"buy","option_c":"buys","option_d":"can buy","answer":"A","analysis":"yesterday 為過去，動詞用 bought。","hint":"過去式 bought"},{"no":"116","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"C卷L6","question":"Olivia took her son to the museum _____.","option_a":"now","option_b":"the other day","option_c":"next Monday","option_d":"next weekend","answer":"B","analysis":"took 為過去式，搭過去時間 the other day。","hint":"過去+the other day"},{"no":"117","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"C卷L6","question":"A: Why _____ you come to the party? B: I was very busy.","option_a":"didn't","option_b":"wasn't","option_c":"don't","option_d":"can't","answer":"A","analysis":"回答過去原因，問句用 didn't。","hint":"Why didn't+原形"},{"no":"118","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"C卷L6","question":"A: Why did Sara _____ a cake? B: It is her mother's birthday today.","option_a":"made","option_b":"makes","option_c":"make","option_d":"making","answer":"C","analysis":"Did 後接原形動詞 make。","hint":"Did+原形"},{"no":"119","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"C卷L6","question":"A: Welcome to my home, Tina and Sheree. B: ____________ How are you?","option_a":"You know what?","option_b":"Nice! Thank you, Uncle Bill.","option_c":"Good to see you again, Uncle Bill.","option_d":"You can go see the sights, Uncle Bill.","answer":"C","analysis":"再次見面打招呼用 Good to see you again。","hint":"再見面問候"},{"no":"120","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"C卷L6","question":"A: We were on the train for seven hours. B: ____________","option_a":"It is very near the school.","option_b":"I can take you there.","option_c":"I just went there with a friend.","option_d":"You really traveled a long way.","answer":"D","analysis":"搭七小時車表示路程很遠。","hint":"路程遠"},{"no":"121","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L6","source":"C卷L6","question":"A: ____________ B: I just had lunch thirty minutes ago.","option_a":"What are you eating?","option_b":"Where is the restaurant?","option_c":"What time did you have dinner?","option_d":"Why don't you get some snacks?","answer":"D","analysis":"B答剛吃過，A 應為提議吃點心。","hint":"提議零食"},{"no":"122","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"C卷L56","question":"I _____ in the classroom yesterday morning, not in the library.","option_a":"am","option_b":"was","option_c":"do","option_d":"did","answer":"B","analysis":"yesterday morning 為過去，主詞 I 用 was。","hint":"I+was"},{"no":"123","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"C卷L56","question":"A: _____ Bruce do his homework last night? B: No, he _____.","option_a":"Does; didn't","option_b":"Didn't; did","option_c":"Did; doesn't","option_d":"Did; didn't","answer":"D","analysis":"last night 過去式問句用 Did，否定簡答 didn't。","hint":"Did/didn't"},{"no":"124","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"C卷L56","question":"Oliver _____ a sad movie on TV an hour ago, and he is still crying now.","option_a":"watch","option_b":"watches","option_c":"watched","option_d":"is watching","answer":"C","analysis":"an hour ago 為過去，動詞用 watched。","hint":"過去式 watched"},{"no":"125","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"C卷L56","question":"Fiona _____ to school today; she was sick.","option_a":"didn't go","option_b":"doesn't go","option_c":"can't go","option_d":"isn't going","answer":"A","analysis":"was sick 為過去，故用 didn't go。","hint":"didn't go"},{"no":"126","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"C卷L56","question":"A: _____ did Zack come home last night? B: At seven o'clock.","option_a":"How","option_b":"Why","option_c":"Where","option_d":"When","answer":"D","analysis":"答時間 At seven o'clock，故問 When。","hint":"問時間"},{"no":"127","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"C卷L56","question":"A: Why did Sara go to the park? B: She _____ on a picnic with her friends there.","option_a":"went","option_b":"goes","option_c":"is going","option_d":"can go","answer":"A","analysis":"went 與 go on a picnic 配，過去式。","hint":"went on a picnic"},{"no":"128","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"C卷L56","question":"A: Why were you late today? B: Because I _____ up late this morning.","option_a":"get","option_b":"got","option_c":"can get","option_d":"am getting","answer":"B","analysis":"this morning 已過去，動詞用 got。","hint":"過去式 got"},{"no":"129","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"C卷L56","question":"A: What _____ you _____ yesterday morning? B: I checked out some books from the library.","option_a":"did; did","option_b":"do; did","option_c":"did; do","option_d":"do; do","answer":"C","analysis":"yesterday morning 過去式問句 did + 原形 do。","hint":"did+原形 do"},{"no":"130","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"C卷L56","question":"Because Amelia _____ a lot of cake this afternoon, she is not hungry now.","option_a":"ate","option_b":"eat","option_c":"eats","option_d":"is eating","answer":"A","analysis":"this afternoon 已過去，動詞用 ate。","hint":"過去式 ate"},{"no":"131","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"C卷L56","question":"Alan _____ in the USA many years ago. He was a young student then.","option_a":"studied","option_b":"studies","option_c":"study","option_d":"is studying","answer":"A","analysis":"many years ago 過去，動詞用 studied。","hint":"過去式 studied"},{"no":"132","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"C卷L56","question":"A: ____________ B: I fell out of a tree.","option_a":"What happened to your leg?","option_b":"When did you go to the park?","option_c":"Why did you go to the park?","option_d":"Where were you 15 minutes ago?","answer":"A","analysis":"答受傷原因（從樹上跌下）。","hint":"問怎麼了"},{"no":"133","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"C卷L56","question":"A: Did you go to the new bookstore yesterday? ____________ B: It was nice. There were a lot of comic books and picture books there.","option_a":"How did you like it?","option_b":"What did you do there?","option_c":"Can you take me there?","option_d":"What did you get from the bookstore?","answer":"A","analysis":"答感受 It was nice，問 How did you like it。","hint":"問感受"},{"no":"134","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"C卷L56","question":"A: What did you do at the beach? B: ____________","option_a":"We swam in the sea.","option_b":"We camped on the hill.","option_c":"We hiked in the mountains.","option_d":"We picnicked in the forest.","answer":"A","analysis":"在海邊做的活動是游泳。","hint":"海邊→游泳"},{"no":"135","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"C卷L56","question":"A: What do your friends do? B: ____________","option_a":"They sell cars for a company.","option_b":"They worked at a restaurant.","option_c":"They don't have a lot of money.","option_d":"They made a cake for my birthday.","answer":"A","analysis":"問職業，答賣車的工作。","hint":"問職業"},{"no":"136","subject":"英文","grade":"七年級","exam":"第三次段考","unit":"L56","source":"C卷L56","question":"A: Look at the temple in the picture. It's so beautiful. B: It is! ____________ I went there the other day.","option_a":"How come?","option_b":"You know what?","option_c":"Where is the temple?","option_d":"Why do you often go there?","answer":"B","analysis":"想告訴對方新事情用 You know what。","hint":"你知道嗎"}];

// ── Storage keys ──────────────────────────
const KEY_WRONG    = 'quizWrong';
const KEY_ANSWERED = 'quizAnswered';
const KEY_EXTRA    = 'quizExtra';   // 上傳的額外題目（非內建）

// ── Helpers ───────────────────────────────
const loadWrong = () => {
  try {
    const d = localStorage.getItem(KEY_WRONG) || localStorage.getItem('wrongBook') || '{}';
    const result = JSON.parse(d);
    // If data was stored with old key, migrate it
    if (!localStorage.getItem(KEY_WRONG) && localStorage.getItem('wrongBook')) {
      localStorage.setItem(KEY_WRONG, d);
      localStorage.removeItem('wrongBook');
    }
    return result;
  } catch { return {}; }
};
const loadAnswered = () => {
  try {
    const d = localStorage.getItem(KEY_ANSWERED) || localStorage.getItem('answeredLog') || '{}';
    const result = JSON.parse(d);
    // If data was stored with old key, migrate it
    if (!localStorage.getItem(KEY_ANSWERED) && localStorage.getItem('answeredLog')) {
      localStorage.setItem(KEY_ANSWERED, d);
      localStorage.removeItem('answeredLog');
    }
    return result;
  } catch { return {}; }
};
const loadExtra    = () => { try { return JSON.parse(localStorage.getItem(KEY_EXTRA)    || '[]');  } catch { return [];  } };
const saveWrong    = d => localStorage.setItem(KEY_WRONG,    JSON.stringify(d));
const saveAnswered = d => localStorage.setItem(KEY_ANSWERED, JSON.stringify(d));
const saveExtra    = d => localStorage.setItem(KEY_EXTRA,    JSON.stringify(d));

function compId(q) { return q.subject+'_'+q.grade+'_'+q.exam+'_'+q.unit+'_'+q.no; }

// ── State ─────────────────────────────────
let allQ = [];
let sessionQ = [], curIdx = 0, isAnswered = false;
let quizMode = 'new', uploadMode = 'merge';
let selectedUnits = new Set(['L7']);
let timerRef = null, elapsed = 0;
let sStats = {correct:0, wrong:0, skip:0};

// ── Init ──────────────────────────────────
function init() {
  // BUILTIN_DB is always the base; extras from upload stored separately
  const extra = loadExtra();
  const builtinIds = new Set(BUILTIN_DB.map(q => compId(q)));
  const validExtra = extra.filter(q => !builtinIds.has(compId(q)));
  allQ = [...BUILTIN_DB, ...validExtra];
  populateFilters();
  updateBadge();
  updateSetupStats();
}

function updateSetupStats() {
  document.getElementById('stat-total').textContent       = allQ.length;
  document.getElementById('stat-answered').textContent    = Object.keys(loadAnswered()).length;
  document.getElementById('stat-wrong-total').textContent = Object.keys(loadWrong()).length;
}

// ── Filters ───────────────────────────────
function populateFilters() {
  const subjects = [...new Set(allQ.map(q=>q.subject))].filter(Boolean).sort();
  const grades   = [...new Set(allQ.map(q=>q.grade))].filter(Boolean).sort();
  const exams    = [...new Set(allQ.map(q=>q.exam))].filter(Boolean).sort();
  fillSel('sel-subject', subjects);
  fillSel('sel-grade',   grades);
  fillSel('sel-exam',    exams);
  onFilterChange();
}
function fillSel(id, values) {
  const sel = document.getElementById(id);
  const cur = sel.value;
  sel.innerHTML = '<option value="">全部</option>' + values.map(v=>`<option value="${v}">${v}</option>`).join('');
  if (values.includes(cur)) sel.value = cur;
  else if (values.length) sel.value = values[0];
}
function onFilterChange() {
  const pool = getPool({ignoreUnits:true});
  const subj = document.getElementById('sel-subject').value;
  const UNIT_ORDER = subj === '英文'
    ? ['L5','L6','L56']
    : ['L7','L8','L9','L10','L7~10'];
  const units = [...new Set(pool.map(q=>q.unit))].filter(Boolean).sort((a,b)=>{
    const ia=UNIT_ORDER.indexOf(a), ib=UNIT_ORDER.indexOf(b);
    if(ia!==-1&&ib!==-1) return ia-ib;
    if(ia!==-1) return -1; if(ib!==-1) return 1;
    return a.localeCompare(b,'zh');
  });
  // 若切換科目後目前選取的單元不存在，自動重設為第一個
  const hasValid = selectedUnits.has('all') || [...selectedUnits].some(u=>units.includes(u));
  if (!hasValid && units.length > 0) selectedUnits = new Set([units[0]]);
  const grid = document.getElementById('unit-grid');
  grid.innerHTML = '';
  units.forEach(u => {
    const cnt = pool.filter(q=>q.unit===u).length;
    const active = !selectedUnits.has('all') && selectedUnits.has(u);
    grid.innerHTML += `<span class="unit-chip${active?' active':''}" onclick="toggleUnit('${u}',this)">${u} <span style="opacity:0.6;font-size:0.7rem">${cnt}</span></span>`;
  });
  grid.innerHTML += `<span class="unit-chip all-chip${selectedUnits.has('all')?' active':''}" onclick="toggleUnit('all',this)">全部單元</span>`;
  updateAvail();
}
function toggleUnit(u, el) {
  if (u==='all') {
    selectedUnits = new Set(['all']);
    document.querySelectorAll('.unit-chip').forEach(c=>c.classList.remove('active'));
    el.classList.add('active');
  } else {
    selectedUnits.delete('all');
    document.querySelector('.all-chip').classList.remove('active');
    if (selectedUnits.has(u)) {
      selectedUnits.delete(u);
      el.classList.remove('active');
      if (selectedUnits.size===0) { selectedUnits.add('all'); document.querySelector('.all-chip').classList.add('active'); }
    } else {
      selectedUnits.add(u);
      el.classList.add('active');
    }
  }
  updateAvail();
}
function getPool({ignoreUnits=false}={}) {
  const subj  = document.getElementById('sel-subject').value;
  const grade = document.getElementById('sel-grade').value;
  const exam  = document.getElementById('sel-exam').value;
  const wrong = loadWrong(), answered = loadAnswered();
  let pool = allQ;
  if (subj)  pool = pool.filter(q=>q.subject===subj);
  if (grade) pool = pool.filter(q=>q.grade===grade);
  if (exam)  pool = pool.filter(q=>q.exam===exam);
  if (!ignoreUnits && !selectedUnits.has('all'))
    pool = pool.filter(q=>selectedUnits.has(q.unit));
  if (quizMode==='wrong') pool = pool.filter(q=>wrong[compId(q)]);
  if (quizMode==='new')   pool = pool.filter(q=>!answered[compId(q)]);
  return pool;
}
function updateAvail() {
  const pool = getPool();
  const wrong = loadWrong(), answered = loadAnswered();
  const n = parseInt(document.getElementById('q-slider').value);
  const actual = Math.min(n, pool.length);
  document.getElementById('slider-hint').innerHTML = `篩選後共 <strong>${pool.length}</strong> 題，出 <strong>${actual}</strong> 題`;
  document.getElementById('start-btn').disabled = pool.length===0;
  document.getElementById('pb-new').textContent   = pool.filter(q=>!answered[compId(q)]).length;
  document.getElementById('pb-wrong').textContent = pool.filter(q=>wrong[compId(q)]).length;
  document.getElementById('pb-done').textContent  = pool.filter(q=>answered[compId(q)]&&!wrong[compId(q)]).length;
}
function onSlider(el) {
  document.getElementById('slider-val').textContent = el.value;
  updateAvail();
}
function setMode(m, btn) {
  quizMode = m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  updateAvail();
}

// ── Quiz ──────────────────────────────────
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function prioritySort(pool) {
  const wrong=loadWrong(), answered=loadAnswered();
  return [
    ...shuffle(pool.filter(q=>!answered[compId(q)])),
    ...shuffle(pool.filter(q=>wrong[compId(q)]&&answered[compId(q)])),
    ...shuffle(pool.filter(q=>answered[compId(q)]&&!wrong[compId(q)]))
  ];
}
function startQuiz() {
  const pool=getPool();
  const n=Math.min(parseInt(document.getElementById('q-slider').value),pool.length);
  if(!n){ alert('沒有符合條件的題目！'); return; }
  sessionQ=prioritySort(pool).slice(0,n);
  curIdx=0; sStats={correct:0,wrong:0,skip:0};
  startTimer(); showScreen('quiz'); renderQ();
}
function startTimer() {
  if(timerRef) clearInterval(timerRef);
  elapsed=0;
  timerRef=setInterval(()=>{
    elapsed++;
    const m=String(Math.floor(elapsed/60)).padStart(2,'0');
    const s=String(elapsed%60).padStart(2,'0');
    const el=document.getElementById('quiz-timer');
    el.textContent=m+':'+s;
    el.className='quiz-timer'+(elapsed>120?' warn':'');
  },1000);
}
function renderQ() {
  isAnswered=false;
  const q=sessionQ[curIdx];
  const total=sessionQ.length, num=curIdx+1;
  const wrong=loadWrong(), answered=loadAnswered();
  const id=compId(q);
  document.getElementById('quiz-tag').textContent=q.subject+'・'+q.exam;
  document.getElementById('quiz-counter').textContent='第 '+num+' / '+total+' 題';
  document.getElementById('progress-fill').style.width=(num/total*100)+'%';
  const done=sStats.correct+sStats.wrong;
  document.getElementById('quiz-correct-rate').textContent=done>0?'答對率 '+Math.round(sStats.correct/done*100)+'%':'答對率 —';
  let badge='';
  if(!answered[id])      badge='<div class="q-priority new-q">🔵 新題目</div>';
  else if(wrong[id])     badge='<div class="q-priority wrong-q">🔴 曾經答錯</div>';
  else                   badge='<div class="q-priority done-q">✅ 複習題</div>';
  document.getElementById('q-priority-badge').innerHTML=badge;
  document.getElementById('quiz-question').textContent=q.question;
  document.getElementById('options-list').innerHTML=['A','B','C','D'].map(l=>
    `<button class="opt-btn" onclick="selectAns('${l}',this)"><span class="opt-label">${l}</span><span>${q['option_'+l.toLowerCase()]}</span></button>`
  ).join('');
  document.getElementById('feedback').className='feedback';
  document.getElementById('btn-skip').style.display='';
  document.getElementById('btn-skip').disabled=false;
  document.getElementById('btn-next').style.display='none';
}
function selectAns(letter, btn) {
  if(isAnswered) return;
  isAnswered=true;
  const q=sessionQ[curIdx];
  const isOk=letter===q.answer;
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  if(isOk) {
    btn.classList.add('correct');
    btn.querySelector('.opt-label').textContent='✓';
    sStats.correct++;
  } else {
    btn.classList.add('wrong');
    btn.querySelector('.opt-label').textContent='✗';
    sStats.wrong++;
    recordWrong(q);
    const idx=['A','B','C','D'].indexOf(q.answer);
    const allBtns=document.querySelectorAll('.opt-btn');
    allBtns[idx].classList.add('reveal');
    allBtns[idx].querySelector('.opt-label').textContent='✓';
  }
  recordAnswered(q, isOk);
  const fb=document.getElementById('feedback');
  fb.className='feedback show '+(isOk?'correct':'wrong');
  document.getElementById('fb-title').textContent=isOk?'答對了！🎉':'答錯了 😢';
  document.getElementById('fb-text').textContent=q.analysis||(isOk?'繼續保持！':'正確答案是 ('+q.answer+') '+q['option_'+q.answer.toLowerCase()]);
  const hintEl=document.getElementById('fb-hint');
  if(q.hint){ hintEl.textContent='💡 '+q.hint; hintEl.style.display=''; }
  else hintEl.style.display='none';
  document.getElementById('btn-skip').style.display='none';
  document.getElementById('btn-next').style.display='';
  updateBadge();
}
function skipQ() { if(isAnswered) return; sStats.skip++; nextQ(); }
function nextQ() { curIdx++; if(curIdx>=sessionQ.length) endQuiz(); else renderQ(); }
function endQuiz() {
  if(timerRef){ clearInterval(timerRef); timerRef=null; }
  const total=sessionQ.length;
  const pct=total>0?Math.round(sStats.correct/total*100):0;
  let grade='F',title='再加油！';
  if(pct>=95){grade='S';title='完美！神乎其技！';}
  else if(pct>=85){grade='A';title='優秀！繼續保持！';}
  else if(pct>=70){grade='B';title='不錯！還有進步空間！';}
  else if(pct>=55){grade='C';title='及格！再努力一些！';}
  else if(pct>=40){grade='D';title='需要多加練習！';}
  document.getElementById('result-grade').textContent=grade;
  document.getElementById('result-pct').textContent='正確率 '+pct+'%';
  document.getElementById('result-title').textContent=title;
  document.getElementById('result-sub').textContent=sStats.correct+' 對 · '+sStats.wrong+' 錯 · '+sStats.skip+' 跳過';
  document.getElementById('res-correct').textContent=sStats.correct;
  document.getElementById('res-wrong').textContent=sStats.wrong;
  document.getElementById('res-skip').textContent=sStats.skip;
  showScreen('result'); updateSetupStats();
}
function confirmBack() {
  if(!isAnswered||curIdx===0||confirm('確定要離開測驗？')){
    if(timerRef){ clearInterval(timerRef); timerRef=null; }
    showScreen('setup');
  }
}

// ── Records ───────────────────────────────
function recordWrong(q) {
  const wb=loadWrong(), id=compId(q), today=new Date().toLocaleDateString('zh-TW');
  if(!wb[id]) wb[id]={count:0,lastDate:'',q};
  wb[id].count++; wb[id].lastDate=today; wb[id].q=q;
  saveWrong(wb);
}
function recordAnswered(q, isOk) {
  const log=loadAnswered(), id=compId(q), today=new Date().toLocaleDateString('zh-TW');
  if(!log[id]) log[id]={correct:0,wrong:0,lastDate:''};
  if(isOk) log[id].correct++; else log[id].wrong++;
  log[id].lastDate=today;
  saveAnswered(log);
}
function updateBadge() {
  const cnt=Object.keys(loadWrong()).length;
  const el=document.getElementById('wrongBadge');
  if(cnt>0){ el.style.display=''; el.textContent=cnt>99?'99+':cnt; }
  else el.style.display='none';
}

// ── Reset ─────────────────────────────────
function resetAnswered() {
  if(!confirm('確定要清除所有答題紀錄嗎？\n（錯題本不受影響，題庫保留）')) return;
  // 掃描所有 key，刪除答題相關的
  const toDelete = [];
  for(let i=0; i<localStorage.length; i++) {
    const k = localStorage.key(i);
    if(k && (k.includes('answer') || k.includes('Answer') || k.includes('answered'))) toDelete.push(k);
  }
  toDelete.forEach(k => localStorage.removeItem(k));
  console.log('Cleared answered keys:', toDelete);
  updateBadge(); updateSetupStats(); updateAvail();
  alert('✅ 已清除答題紀錄（清除了 '+toDelete.length+' 筆），所有題目重新視為「未答過」！');
}
function resetAll() {
  if(!confirm('確定要全部重置嗎？\n答題紀錄和錯題本都會清空。\n（題庫資料保留）')) return;
  // 清除此頁面所有 localStorage（保留題庫 extra）
  const extra = localStorage.getItem(KEY_EXTRA);
  localStorage.clear();
  if(extra) localStorage.setItem(KEY_EXTRA, extra);
  console.log('All localStorage cleared, extra preserved:', !!extra);
  updateBadge(); updateSetupStats(); updateAvail();
  alert('✅ 已全部重置！可以全新開始了。');
}

// ── Wrong book ────────────────────────────
let wbFilter = {subject:'', unit:''};
function setWbFilter(key, val) {
  wbFilter[key] = val;
  if (key === 'subject') wbFilter.unit = '';
  renderWB();
}
function renderWB() {
  const wbData = loadWrong();
  const allItems = Object.values(wbData).sort((a,b)=>b.count-a.count);
  const list = document.getElementById('wb-list');
  const filterDiv = document.getElementById('wb-filter');
  const practiceBar = document.getElementById('wb-practice-bar');
  const practiceBtn = document.getElementById('wb-practice-btn');
  if (!allItems.length) {
    filterDiv.innerHTML = '';
    if(practiceBar) practiceBar.style.display='none';
    list.innerHTML='<div class="wb-empty"><div class="wb-empty-icon">🎉</div><div>錯題本是空的！繼續加油！</div></div>';
    return;
  }
  // Build subject chips
  const subjects = [...new Set(allItems.map(i=>i.q.subject))].filter(Boolean).sort();
  // Filter by subject first to get relevant units
  let bySubj = wbFilter.subject ? allItems.filter(i=>i.q.subject===wbFilter.subject) : allItems;
  const units = [...new Set(bySubj.map(i=>i.q.unit))].filter(Boolean).sort();
  // Filter by unit
  let filtered = wbFilter.unit ? bySubj.filter(i=>i.q.unit===wbFilter.unit) : bySubj;
  // Render filter chips
  let chipHtml = '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">';
  chipHtml += `<span class="unit-chip all-chip${!wbFilter.subject?' active':''}" onclick="setWbFilter('subject','')">全部科目</span>`;
  subjects.forEach(s => {
    chipHtml += `<span class="unit-chip${wbFilter.subject===s?' active':''}" onclick="setWbFilter('subject','${s}')">${s}</span>`;
  });
  chipHtml += '</div><div style="display:flex;flex-wrap:wrap;gap:6px">';
  chipHtml += `<span class="unit-chip all-chip${!wbFilter.unit?' active':''}" onclick="setWbFilter('unit','')">全部單元</span>`;
  units.forEach(u => {
    chipHtml += `<span class="unit-chip${wbFilter.unit===u?' active':''}" onclick="setWbFilter('unit','${u}')">${u}</span>`;
  });
  chipHtml += '</div>';
  filterDiv.innerHTML = chipHtml;
  // Render list
  if (!filtered.length) {
    list.innerHTML='<div class="wb-empty"><div style="font-size:1.5rem;margin-bottom:8px">🔍</div><div>此範圍沒有錯題</div></div>';
    if(practiceBar) practiceBar.style.display='none';
    return;
  }
  list.innerHTML=filtered.map(({count,lastDate,q})=>`
    <div class="wb-item">
      <div class="wb-item-top">
        <div class="wb-badge"><span class="wb-badge-n">${count}</span><span class="wb-badge-l">次</span></div>
        <div style="flex:1">
          <div class="wb-q-text">${q.question}</div>
          <div class="wb-meta">${q.subject} · ${q.grade} · ${q.exam} · ${q.unit} · 最後：${lastDate}</div>
        </div>
      </div>
      <div class="wb-options">
        ${['A','B','C','D'].map(l=>`<div class="wb-opt${q.answer===l?' correct-opt':''}"><span class="wb-opt-label">${l}</span><span>${q['option_'+l.toLowerCase()]}${q.answer===l?' ✓':''}</span></div>`).join('')}
      </div>
      ${q.analysis?`<div class="wb-analysis">📖 ${q.analysis}</div>`:''}
    </div>`).join('');
  // Practice bar
  if(practiceBar) {
    practiceBar.style.display = 'block';
    practiceBtn.textContent = `開始練習所選錯題（${filtered.length} 題）⚔️`;
  }
}
function startWrongPractice() {
  const wbData = loadWrong();
  let items = Object.values(wbData);
  if (wbFilter.subject) items = items.filter(i=>i.q.subject===wbFilter.subject);
  if (wbFilter.unit)    items = items.filter(i=>i.q.unit===wbFilter.unit);
  if (!items.length) { alert('沒有符合條件的錯題！'); return; }
  sessionQ = shuffle(items.map(i=>i.q));
  curIdx=0; sStats={correct:0,wrong:0,skip:0};
  startTimer(); showScreen('quiz'); renderQ();
}
function clearWrongBook() {
  if(!confirm('確定要清除所有錯題紀錄嗎？')) return;
  localStorage.removeItem(KEY_WRONG);
  updateBadge(); renderWB(); updateSetupStats();
}
function exportWrongXLSX() {
  const wb_data=loadWrong();
  const items=Object.values(wb_data);
  if(!items.length){ alert('錯題本是空的！'); return; }
  const rows=items.map(({count,lastDate,q})=>({'科目':q.subject,'年級':q.grade,'段考':q.exam,'單元':q.unit,'題目':q.question,'選項A':q.option_a,'選項B':q.option_b,'選項C':q.option_c,'選項D':q.option_d,'答案':q.answer,'解析':q.analysis,'錯誤次數':count,'最後錯誤日期':lastDate}));
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[8,8,10,8,40,14,14,14,14,6,24,10,14].map(w=>({wch:w}));
  const wb2=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb2,ws,'錯題本');
  XLSX.writeFile(wb2,'錯題本_'+new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')+'.xlsx');
}

// ── Upload ────────────────────────────────
function toggleUpload() {
  const body = document.getElementById('upload-body');
  const icon = document.getElementById('upload-toggle-icon');
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  icon.textContent = open ? '＋' : '－';
}
function setUploadMode(m, btn) {
  uploadMode=m;
  document.querySelectorAll('.upload-mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function handleUpload(input) {
  const file=input.files[0]; if(!file) return;
  const msg=document.getElementById('uploadMsg');
  msg.textContent='讀取中...'; msg.className='upload-msg';
  const reader=new FileReader();
  reader.onload=e=>{
    try {
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const required=['科目','年級','段考','單元','題目','選項A','選項B','選項C','選項D','答案'];
      let newRows=[], sheets=0;
      wb.SheetNames.forEach(sheetName=>{
        const ws=wb.Sheets[sheetName];
        const data=XLSX.utils.sheet_to_json(ws,{defval:''});
        if(!data.length) return;
        const cols=Object.keys(data[0]);
        const missing=required.filter(r=>!cols.includes(r));
        if(missing.length) throw new Error('Sheet「'+sheetName+'」缺少欄位：'+missing.join('、'));
        data.forEach((row,i)=>{
          newRows.push({
            no:String(row['編號']||i+1),subject:String(row['科目']||sheetName),
            grade:String(row['年級']||''),exam:String(row['段考']||''),unit:String(row['單元']||''),
            source:String(row['來源']||''),question:String(row['題目']||''),
            option_a:String(row['選項A']||''),option_b:String(row['選項B']||''),
            option_c:String(row['選項C']||''),option_d:String(row['選項D']||''),
            answer:String(row['答案']||''),analysis:String(row['解析']||''),hint:String(row['提示']||''),
          });
        });
        sheets++;
      });
      if(!newRows.length) throw new Error('沒有讀取到任何題目');
      const builtinIds=new Set(BUILTIN_DB.map(q=>compId(q)));
      if(uploadMode==='replace') {
        localStorage.removeItem(KEY_WRONG);
        localStorage.removeItem(KEY_ANSWERED);
        const extras=newRows.filter(q=>!builtinIds.has(compId(q)));
        saveExtra(extras);
        msg.textContent='✅ 替換完成：載入 '+newRows.length+' 題（'+sheets+' 個 Sheet）';
      } else {
        const existExtra=loadExtra();
        const existIds=new Set([...BUILTIN_DB,...existExtra].map(q=>compId(q)));
        const addOnes=newRows.filter(q=>!existIds.has(compId(q)));
        saveExtra([...existExtra,...addOnes]);
        msg.textContent='✅ 合併完成：新增 '+addOnes.length+' 題';
      }
      msg.className='upload-msg ok';
      init();
    } catch(err) {
      msg.textContent='❌ '+err.message;
      msg.className='upload-msg err';
    }
    input.value='';
  };
  reader.readAsBinaryString(file);
}

// ── Screen ────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  if(name==='wrongbook') renderWB();
  if(name==='setup') { updateAvail(); updateSetupStats(); }
  if(name!=='quiz'&&timerRef) { clearInterval(timerRef); timerRef=null; }
}

// ── Boot ──────────────────────────────────
init();
</script>
